name: flutter_timezone
description: A flutter plugin for getting the local timezone of the device.
version: 5.0.2
homepage: https://github.com/tjarvstrand/flutter_timezone
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: ">=3.41.0"

dependencies:
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  meta: ^1.17.0  
  plugin_platform_interface:
    git: https://github.com/kumsumit/plugin_platform_interface.git

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter


# The following section is specific to Flutter.
flutter:
  plugin:
    platforms:
      android:
        package: net.wolverinebeach.flutter_timezone
        pluginClass: FlutterTimezonePlugin
      ios:
        pluginClass: FlutterTimezonePlugin
      linux:
        pluginClass: FlutterTimezonePlugin
      macos:
        pluginClass: FlutterTimezonePlugin
      windows:
        pluginClass: FlutterTimezonePluginCApi
      web:
        pluginClass: FlutterTimezonePlugin
        fileName: flutter_timezone_web.dart
