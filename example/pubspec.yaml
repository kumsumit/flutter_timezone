name: flutter_timezone_example
description: "Demonstrates how to use the flutter_timezone plugin."
version: 0.0.1

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_timezone:
    path: ../

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  # Enable desktop platforms
  plugin:
    platforms:
      linux:
        pluginClass: FlutterTimezonePlugin
        fileName: flutter_timezone_plugin.cc
      windows:
        pluginClass: FlutterTimezonePlugin
        fileName: flutter_timezone_plugin.cpp
